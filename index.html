<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matrimonio</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@400;500&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Cormorant Garamond', serif;
    background:#f6f3ef;
    color:#4a4a4a;
    text-align:center;
}

/* SECCIONES */
.section{
    min-height:100vh;
    padding:200px 40px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

/* CORAZÓN */
.heart{
    width:170px;
    height:170px;
    background:#e6dcd2;
    position:relative;
    transform:rotate(-45deg);
    animation:latido 1.2s infinite;
    cursor:pointer;
}

.heart:before,
.heart:after{
    content:"";
    width:170px;
    height:170px;
    background:#e6dcd2;
    border-radius:50%;
    position:absolute;
}

.heart:before{top:-85px;}
.heart:after{left:85px;}

@keyframes latido{
    0%{transform:rotate(-45deg) scale(1);}
    50%{transform:rotate(-45deg) scale(1.1);}
    100%{transform:rotate(-45deg) scale(1);}
}

.pulsa{
    margin-top:70px;
    font-size:40px;
    letter-spacing:6px;
}

/* CARTA */
.card{
    background:white;
    padding:120px 80px;
    border-radius:50px;
    box-shadow:0 30px 80px rgba(0,0,0,0.08);
    max-width:700px;
}

/* HERO */
.hero{
    background:url('https://images.pexels.com/photos/931162/pexels-photo-931162.jpeg?auto=compress&cs=tinysrgb&w=1600') center/cover no-repeat;
    position:relative;
    color:white;
}

.hero::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.35);
    top:0;
    left:0;
}

.hero-content{
    position:relative;
    z-index:2;
}

.hero h1{
    font-family:'Great Vibes', cursive;
    font-size:80px;
    margin-bottom:80px;
}

.countdown{
    font-size:42px;
    letter-spacing:4px;
}

/* BLOQUES SEPARADOS */
.block{
    background:white;
    max-width:1000px;
    margin:200px auto;
    padding:160px 80px;
    border-radius:50px;
    box-shadow:0 25px 70px rgba(0,0,0,0.05);
}

.block h2{
    font-size:40px;
    margin-bottom:80px;
}

.block p{
    font-size:22px;
    line-height:2;
}

button{
    margin-top:60px;
    padding:20px 70px;
    border:none;
    border-radius:50px;
    background:#7a5c4d;
    color:white;
    font-size:18px;
}
</style>
</head>

<body>

<div class="section" id="inicio">
    <div class="heart" onclick="mostrarCarta()"></div>
    <div class="pulsa">PULSA</div>
</div>

<div class="section" id="carta" style="display:none;">
    <div class="card">
        <h2>Invitación Especial</h2>
        <h1 contenteditable="true" style="margin-top:80px; font-size:55px;">[Nombre]</h1>
        <button onclick="abrirInvitacion()">Abrir</button>
    </div>
</div>

<div class="section hero" id="hero" style="display:none;">
    <div class="hero-content">
        <h1>Matrimonio de Johanna & Paolo</h1>
        <div class="countdown">XXX días</div>
    </div>
</div>

<div class="block">
    <h2>Ceremonia</h2>
    <p contenteditable="true">Sábado XX de Noviembre</p>
    <p contenteditable="true" style="margin-top:60px;">Lugar del evento</p>
</div>

<div class="block">
    <h2>Galería</h2>
    <img src="https://via.placeholder.com/500" style="width:60%; border-radius:30px;">
</div>

<div class="block">
    <h2>Música</h2>
    <p>¿Qué canción no puede faltar?</p>
    <input type="text" style="margin-top:60px; padding:20px; width:60%;">
</div>

<div class="block">
    <h2>Regalos</h2>
    <p contenteditable="true">Datos bancarios aquí</p>
</div>

<div class="block">
    <h2>Confirmación</h2>
    <button>Sí asistiré</button>
    <button style="background:#b46e6e;">No podré asistir</button>
</div>

<script>
function mostrarCarta(){
    document.getElementById("inicio").style.display="none";
    document.getElementById("carta").style.display="flex";
}

function abrirInvitacion(){
    document.getElementById("carta").style.display="none";
    document.getElementById("hero").style.display="flex";
}
</script>

</body>
</html>
